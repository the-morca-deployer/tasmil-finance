<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e2d40"/>
      <stop offset="100%" stop-color="#0f1923"/>
    </radialGradient>
    <radialGradient id="starGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7ee8f8"/>
      <stop offset="60%" stop-color="#14b8d4"/>
      <stop offset="100%" stop-color="#0891a8"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="url(#bg)"/>

  <!-- Stellar 4-pointed star (sharp diamond style) -->
  <g transform="translate(100,100)" filter="url(#glow)">
    <!-- Main star shape: sharp 4-pointed Stellar-style diamond -->
    <path
      d="M 0,-65 L 8,-8 L 65,0 L 8,8 L 0,65 L -8,8 L -65,0 L -8,-8 Z"
      fill="url(#starGlow)"
    />
  </g>

  <!-- Subtle outer ring -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#14b8d4" stroke-width="1" opacity="0.25"/>
</svg>
